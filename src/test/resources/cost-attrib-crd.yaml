apiVersion: costattribution.k8s.io/v1
kind: CostAttribution
metadata:
  name: aiml-obsv-tag-spec
spec:
  createdTime: 2023-06-20 # Creation timestamp
  version: 0 # Version of this spec
  domain: siri # Deployment of this spec
  tags:
    - name: aiml_obsv_user
      required: true
      description: User submitting a job.
    - name: aiml_obsv_job_id
      required: true
      description: Unique identifier for a job that is generated by the gateway
    - name: aiml_obsv_queue
      required: true
      description: Queue or Namespace name for a job
    - name: aiml_obsv_job_name
      required: false
      description: Submitted by the user, a name for a job.
    - name: aiml_obsv_project_id
      required: false
      description: Submitted by the user, the project id for a job. See <Link> for information on how to access this for your job.

