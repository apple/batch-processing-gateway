{{ if false }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod
  namespace: UPDATE-ON-MANUAL-SPINNAKER-DEPLOYMENT-WITH-PROD-NAMESPACE
  annotations:
    ingress.beta.kubernetes.io/sni: "true"
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 800m
    nginx.ingress.kubernetes.io/upstream-hash-by: $binary_remote_addr
    nginx.ingress.kubernetes.io/rewrite-target: /skatev1/$1
    nginx.ingress.kubernetes.io/proxy-read-timeout: "200"
spec:
  rules:
    - host: batch-gateway-test.aws.ocean.g.apple.com
      http:
        paths:
          - backend:
              service:
                name: prod-auth
                port:
                  number: 80
            path: /prod/(.*)
            pathType: ImplementationSpecific
  tls:
    - hosts:
        - batch-gateway-test.aws.ocean.g.apple.com
      secretName: batch-gateway-test.aws.ocean.g.apple.com-tls-secret-20210913
{{ end }}
