apiVersion: v1
kind: Service
metadata:
  name: skate
  namespace: {{ .Values.skate.namespace }}
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  selector:
    app: skate

---

apiVersion: v1
kind: Service
metadata:
  name: skate-authed
  namespace: {{ .Values.skate.namespace }}
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9090
  selector:
    app: skate
