apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bpg-monitor-ingress
  annotations:
    ingress.beta.kubernetes.io/sni: "true"
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 12288m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/rewrite-target: /skatev2/$1
    nginx.ingress.kubernetes.io/upstream-hash-by: $binary_remote_addr
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
spec:
  rules:
    - host: {{ .Values.ingress.endpoint }}
      http:
        paths:
          - path: /hidden-skatev2/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bpg-monitor-authed
                port:
                  number: 9091
  tls:
    - hosts:
        - {{ .Values.ingress.endpoint }}
      secretName: {{ .Values.ingress.tlsSecretName }}
