apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: applecm-sample-corpca
    cert-manager.io/issuer-kind: AppleCertificateManagerCorpCA
    cert-manager.io/issuer-group: cmcs.crypto-services.apple.com
    cert-manager.io/common-name: {{ .Values.ingress.endpoint }}
    cert-manager.io/private-key-rotation-policy: "Always"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  name: bpg-swagger-ingress
spec:
  rules:
  - host: {{ .Values.ingress.endpoint }}
    http:
      paths:
      - backend:
          service:
            name: bpg
            port:
              number: 80
        path: /(openapi\.(json|yaml)$)
        pathType: ImplementationSpecific
      - backend:
          service:
            name: bpg-swagger-ui
            port:
              number: 80
        path: /swagger
        pathType: ImplementationSpecific
      - backend:
          service:
            name: bpg-swagger-ui
            port:
              number: 80
        path: /(.*\.css$)
        pathType: ImplementationSpecific
      - backend:
          service:
            name: bpg-swagger-ui
            port:
              number: 80
        path: /(.*\.js$)
        pathType: ImplementationSpecific
  tls:
  - hosts:
    - {{ .Values.ingress.endpoint }}
    secretName: {{ .Values.ingress.tlsSecretName }}