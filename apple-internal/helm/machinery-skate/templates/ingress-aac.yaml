{{- if .Values.notary.notaryAacEnabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bpg-aac-ingress
  annotations:
    ingress.beta.kubernetes.io/sni: "true"
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 12288m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/rewrite-target: /skatev2/$1
    nginx.ingress.kubernetes.io/upstream-hash-by: $binary_remote_addr
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    cert-manager.io/issuer: applecm-corpca
    cert-manager.io/issuer-kind: AppleCertificateManagerCorpCA
    cert-manager.io/issuer-group: cmcs.crypto-services.apple.com
    cert-manager.io/common-name: {{ .Values.ingress.endpoint }}
    cert-manager.io/private-key-rotation-policy: "Always"
    cert-manager.io/revision-history-limit: "2"
    cert-manager.io/duration: {{ .Values.ingress.sslCertDuration | default "8760h" | quote }} # 1 year Duration
    cert-manager.io/renew-before: {{ .Values.ingress.sslCertRenewBefore | default "360h" | quote }}
spec:
  rules:
    - host: {{ .Values.ingress.endpoint }}
      http:
        paths:
          - path: /skatev2-aac/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bpg-aac-authed
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.ingress.endpoint }}
      secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
